<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>라방 타이밍 체크</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --canvas: #fffaf0;
  --surface-soft: #faf5e8;
  --surface-card: #f5f0e0;
  --surface-strong: #ebe6d6;
  --hairline: #e5ded0;
  --ink: #0a0a0a;
  --body: #3a3a3a;
  --muted: #6a6a6a;
  --muted-soft: #9a9a9a;
  --pink: #ff4d8b;
  --pink-text: #7a0030;
  --teal: #1a3a3a;
  --lavender: #b8a4ed;
  --lavender-text: #2e2150;
  --peach: #ffb084;
  --peach-text: #5a2a00;
  --ochre: #e8b94a;
  --ochre-text: #4a3300;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
}

body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: var(--canvas);
  color: var(--ink);
  min-height: 100vh;
}

main { max-width: 720px; margin: 0 auto; padding: 4rem 1.5rem 4rem; }

.hero { text-align: center; margin-bottom: 2.5rem; }
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--muted);
  background: var(--surface-card);
  padding: 6px 14px;
  border-radius: 9999px;
  margin-bottom: 1.5rem;
}
.eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ochre); }

h1 {
  font-size: 44px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.2;
  color: var(--ink);
  margin-bottom: 0.75rem;
}
h1 .accent { color: var(--pink); }

.sub {
  font-size: 16px;
  color: var(--muted);
  line-height: 1.6;
}

.search-wrap {
  display: flex;
  gap: 8px;
  margin: 2rem 0 1.5rem;
}
.search-wrap input {
  flex: 1;
  height: 56px;
  padding: 0 20px;
  font-size: 16px;
  font-family: inherit;
  background: #fff;
  border: 1.5px solid var(--hairline);
  border-radius: var(--radius-md);
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
}
.search-wrap input::placeholder { color: var(--muted-soft); }
.search-wrap input:focus { border-color: var(--ink); }
.search-wrap button {
  height: 56px;
  padding: 0 28px;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s;
}
.search-wrap button:hover { opacity: 0.85; }
.search-wrap button:disabled { opacity: 0.4; cursor: not-allowed; }

.chips { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 2.5rem; }
.chip {
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  background: var(--surface-card);
  padding: 7px 14px;
  border-radius: 9999px;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: background 0.15s;
}
.chip:hover { background: var(--surface-strong); }

.price-link {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  height: 52px;
  background: var(--lavender);
  color: var(--lavender-text);
  border-radius: var(--radius-lg);
  text-decoration: none;
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 1.5rem;
}
.price-link:hover { opacity: 0.9; }

.verdict {
  background: var(--peach);
  border-radius: var(--radius-xl);
  padding: 24px 28px;
  margin-bottom: 1.5rem;
  display: none;
}
.verdict.show { display: block; }
.verdict-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--peach-text);
  opacity: 0.7;
  margin-bottom: 8px;
}
.verdict-text {
  font-size: 17px;
  font-weight: 500;
  color: var(--peach-text);
  line-height: 1.55;
}
.verdict-text .highlight { font-weight: 700; }

.status {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 1rem;
  min-height: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.spinner {
  width: 14px; height: 14px;
  border: 1.5px solid var(--hairline);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.section { margin-bottom: 2rem; }
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  padding: 0 4px;
}
.section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-upcoming { background: var(--teal); }
.dot-past { background: var(--lavender); }
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
}
.section-count {
  font-size: 12px;
  color: var(--muted-soft);
  margin-left: auto;
}

.cards { display: flex; flex-direction: column; gap: 8px; }

.card {
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.1s;
}
.card:hover { transform: translateY(-1px); }
.card.upcoming { background: var(--teal); color: #e8f0ed; }
.card.past { background: var(--surface-card); color: var(--ink); }

.date-col { min-width: 46px; text-align: center; flex-shrink: 0; }
.date-month { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; opacity: 0.65; }
.date-day { font-size: 24px; font-weight: 700; line-height: 1.15; }
.date-time { font-size: 10px; opacity: 0.65; margin-top: 2px; }

.vline { width: 1px; align-self: stretch; flex-shrink: 0; opacity: 0.15; background: currentColor; }

.info { flex: 1; min-width: 0; }
.platform {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 3px 9px;
  border-radius: 9999px;
  margin-bottom: 6px;
}
.card.upcoming .platform { background: rgba(255,255,255,0.15); color: #b8e8d8; }
.card.past .platform { background: var(--ochre); color: var(--ochre-text); }

.title {
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.badge {
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 700;
  padding: 4px 9px;
  border-radius: 9999px;
  align-self: flex-start;
}
.badge-live { background: var(--pink); color: #fff; }
.badge-upcoming { background: rgba(255,255,255,0.2); color: #fff; }

.ago-tag { font-size: 10px; opacity: 0.55; flex-shrink: 0; align-self: flex-start; margin-top: 3px; }

.empty {
  text-align: center;
  padding: 3.5rem 1rem;
  color: var(--muted-soft);
  font-size: 14px;
  line-height: 1.8;
}

footer {
  text-align: center;
  font-size: 12px;
  color: var(--muted-soft);
  padding: 2rem;
}
</style>
</head>
<body>

<main>
  <div class="hero">
    <div class="eyebrow"><span class="dot"></span>라방바 데이터 기반</div>
    <h1>지금 살까,<br><span class="accent">방송</span> 기다릴까?</h1>
    <p class="sub">브랜드명을 검색하면 예정 방송과 지난 방송을<br>한눈에 비교해드려요</p>
  </div>

  <div class="search-wrap">
    <input type="text" id="input" placeholder="브랜드명을 입력해보세요" />
    <button id="btn" onclick="doSearch()">검색</button>
  </div>

  <div class="chips">
    <button class="chip" onclick="quickSearch('아토팜')">아토팜</button>
    <button class="chip" onclick="quickSearch('로보락')">로보락</button>
    <button class="chip" onclick="quickSearch('달바')">달바</button>
    <button class="chip" onclick="quickSearch('크록스')">크록스</button>
  </div>

  <a id="priceBtn" class="price-link" style="display:none" target="_blank" rel="noopener">
    현재 쿠팡 최저가 확인하기 →
  </a>

  <div class="verdict" id="verdict">
    <div class="verdict-label">타이밍 분석</div>
    <div class="verdict-text" id="verdictText"></div>
  </div>

  <div class="status" id="status"></div>
  <div id="result">
    <div class="empty">브랜드명을 검색하면<br>예정 방송과 과거 방송을 함께 보여드려요</div>
  </div>
</main>

<footer>데이터 출처: 라방바 데이터랩</footer>

<script>
const input = document.getElementById('input');
const btn = document.getElementById('btn');
const statusEl = document.getElementById('status');
const resultEl = document.getElementById('result');
const verdictEl = document.getElementById('verdict');
const verdictText = document.getElementById('verdictText');

input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function quickSearch(keyword) {
  input.value = keyword;
  doSearch();
}

function setStatus(msg, loading) {
  statusEl.innerHTML = loading
    ? `<div class="spinner"></div>${msg}`
    : msg ? `<span>${msg}</span>` : '';
}

function parseLabangDate(str) {
  if (!str || str.length < 8) return null;
  const yy = str.slice(0, 2), mm = str.slice(2, 4), dd = str.slice(4, 6);
  const hh = str.slice(6, 8), mi = str.slice(8, 10) || '00';
  return new Date(`20${yy}-${mm}-${dd}T${hh}:${mi}:00`);
}

function parseSearchDate(str) {
  const m = str.match(/(\d{2})\.(\d{2})\.(\d{2})\s*\([^)]+\)\s*(\d{2}:\d{2})/);
  if (!m) return null;
  return new Date(`20${m[1]}-${m[2]}-${m[3]}T${m[4]}:00`);
}

function fmtDate(d) {
  if (!d) return { month: '?', day: '?', time: '' };
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  return {
    month: months[d.getMonth()],
    day: d.getDate(),
    time: `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`,
  };
}

function daysFromNow(d) {
  if (!d) return null;
  return Math.round((d - new Date()) / (1000 * 60 * 60 * 24));
}

function upcomingCard(item) {
  const start = parseLabangDate(item.start);
  const dt = fmtDate(start);
  const isLive = item.status === 1;
  const days = daysFromNow(start);
  const badge = isLive
    ? `<span class="badge badge-live">LIVE</span>`
    : `<span class="badge badge-upcoming">${days === 0 ? '오늘' : days + '일 후'}</span>`;
  return `
    <a class="card upcoming" href="${item.url || '#'}" target="_blank" rel="noopener">
      <div class="date-col">
        <div class="date-month">${dt.month}</div>
        <div class="date-day">${dt.day}</div>
        <div class="date-time">${dt.time}</div>
      </div>
      <div class="vline"></div>
      <div class="info">
        <span class="platform">${item.platform || '라이브'}</span>
        <div class="title">${item.title}</div>
      </div>
      ${badge}
    </a>`;
}

function pastCard(item) {
  const d = parseSearchDate(item.date);
  const dt = fmtDate(d);
  const days = daysFromNow(d);
  const ago = days === null ? '' : `${Math.abs(days)}일 전`;
  return `
    <a class="card past" href="${item.url}" target="_blank" rel="noopener">
      <div class="date-col">
        <div class="date-month">${dt.month}</div>
        <div class="date-day">${dt.day}</div>
        <div class="date-time">${dt.time}</div>
      </div>
      <div class="vline"></div>
      <div class="info">
        <span class="platform">${item.platform}</span>
        <div class="title">${item.title}</div>
      </div>
      ${ago ? `<span class="ago-tag">${ago}</span>` : ''}
    </a>`;
}

function makeVerdict(upcoming, past) {
  const nextBcast = upcoming[0];
  const lastBcast = past[0];

  if (upcoming.length === 0 && past.length === 0) return null;

  if (upcoming.length > 0) {
    const start = parseLabangDate(nextBcast.start);
    const days = daysFromNow(start);
    if (days <= 3) {
      return `<span class="highlight">잠깐 기다리세요!</span> ${days === 0 ? '오늘' : days + '일 후'} ${nextBcast.platform}에서 방송 예정이에요. 방송 혜택 확인 후 구매를 추천해요.`;
    } else if (days <= 7) {
      return `${days}일 후 방송이 있어요 (${nextBcast.platform}). 급하지 않다면 기다려볼 만해요.`;
    } else {
      return `가장 가까운 방송까지 <span class="highlight">${days}일</span> 남았어요. 급하면 지금 구매, 여유 있으면 기다려보세요.`;
    }
  }

  if (past.length > 0) {
    const last = parseSearchDate(lastBcast.date);
    const ago = Math.abs(daysFromNow(last));
    return `예정된 방송 정보가 없어요. 최근 방송은 <span class="highlight">${ago}일 전</span>이었어요 (${lastBcast.platform}).`;
  }

  return null;
}

async function doSearch() {
  const keyword = input.value.trim();
  if (!keyword) return;

  btn.disabled = true;
  verdictEl.classList.remove('show');
  resultEl.innerHTML = '';
  document.getElementById('priceBtn').style.display = 'none';
  setStatus(`"${keyword}" 검색 중…`, true);

  try {
    const [schedRes, searchRes] = await Promise.all([
      fetch(`/api/schedule?keyword=${encodeURIComponent(keyword)}`),
      fetch(`/api/search?keyword=${encodeURIComponent(keyword)}`),
    ]);

    const schedData = await schedRes.json();
    const searchData = await searchRes.json();

    const upcoming = schedData.upcoming || [];
    const past = searchData.past || [];

    const total = upcoming.length + past.length;
    setStatus(total ? `예정 ${upcoming.length}건 · 과거 ${past.length}건 발견` : '검색 결과가 없어요');

    const priceBtn = document.getElementById('priceBtn');
    priceBtn.href = 'https://alltimeprice.com/search/?search=' + encodeURIComponent(keyword);
    priceBtn.style.display = 'flex';

    const verdict = makeVerdict(upcoming, past);
    if (verdict) {
      verdictText.innerHTML = verdict;
      verdictEl.classList.add('show');
    }

    let html = '';

    if (upcoming.length) {
      html += `
        <div class="section">
          <div class="section-header">
            <div class="section-dot dot-upcoming"></div>
            <div class="section-title">예정 방송</div>
            <div class="section-count">${upcoming.length}건</div>
          </div>
          <div class="cards">${upcoming.map(upcomingCard).join('')}</div>
        </div>`;
    }

    if (past.length) {
      html += `
        <div class="section">
          <div class="section-header">
            <div class="section-dot dot-past"></div>
            <div class="section-title">지난 방송 · 최근 3개월</div>
            <div class="section-count">${past.length}건</div>
          </div>
          <div class="cards">${past.map(pastCard).join('')}</div>
        </div>`;
    }

    if (!html) {
      html = `<div class="empty">"${keyword}" 방송 기록이 없어요.<br>브랜드명을 다시 확인해보세요.</div>`;
    }

    resultEl.innerHTML = html;

  } catch (e) {
    setStatus('오류: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
