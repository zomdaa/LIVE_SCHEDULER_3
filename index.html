<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>라방 타이밍 체크</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #242424;
  --text: #f0ede8;
  --text2: #888;
  --text3: #555;
  --accent: #FFD84D;
  --accent2: #FFF0A0;
  --upcoming: #1a2a1a;
  --upcoming-border: #2d4a2d;
  --upcoming-text: #7ec87e;
  --past: #1a1a2a;
  --past-border: #2d2d4a;
  --border: rgba(255,255,255,0.08);
  --radius: 14px;
}

body {
  font-family: 'Apple SD Gothic Neo', -apple-system, 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

header {
  padding: 2rem 1.5rem 1.5rem;
  max-width: 680px;
  margin: 0 auto;
}
.logo {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.4rem;
}
.tagline {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}
.tagline span { color: var(--accent); }

main { max-width: 680px; margin: 0 auto; padding: 0 1rem 4rem; }

.search-wrap {
  display: flex;
  gap: 8px;
  margin: 1.5rem 0 2rem;
}
.search-wrap input {
  flex: 1;
  height: 50px;
  padding: 0 16px;
  font-size: 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  outline: none;
  font-family: inherit;
  transition: border-color 0.2s;
}
.search-wrap input::placeholder { color: var(--text3); }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap button {
  height: 50px;
  padding: 0 24px;
  background: var(--accent);
  color: #0f0f0f;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.15s;
  white-space: nowrap;
}
.search-wrap button:hover { opacity: 0.85; }
.search-wrap button:disabled { opacity: 0.4; cursor: not-allowed; }

/* 판단 배너 */
.verdict {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 1.5rem;
  display: none;
}
.verdict.show { display: block; }
.verdict-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 6px;
}
.verdict-text {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.5;
}
.verdict-text .highlight { color: var(--accent); font-weight: 700; }

/* 섹션 */
.section { margin-bottom: 2rem; }
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.section-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-upcoming { background: var(--upcoming-text); }
.dot-past { background: #7e9ec8; }
.section-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text2);
}
.section-count {
  font-size: 11px;
  color: var(--text3);
  margin-left: auto;
}

/* 카드 */
.cards { display: flex; flex-direction: column; gap: 6px; }

.card {
  border-radius: 10px;
  padding: 13px 15px;
  display: flex;
  align-items: flex-start;
  gap: 13px;
  text-decoration: none;
  color: inherit;
  transition: opacity 0.15s;
}
.card:hover { opacity: 0.8; }
.card.upcoming { background: var(--upcoming); border: 1px solid var(--upcoming-border); }
.card.past { background: var(--past); border: 1px solid var(--past-border); }

.date-col { min-width: 44px; text-align: center; flex-shrink: 0; }
.date-month { font-size: 10px; color: var(--text2); font-weight: 600; letter-spacing: 0.05em; }
.date-day { font-size: 22px; font-weight: 700; line-height: 1.1; }
.date-time { font-size: 10px; color: var(--text2); margin-top: 1px; }
.card.upcoming .date-day { color: var(--upcoming-text); }
.card.past .date-day { color: #7e9ec8; }

.vline { width: 1px; background: var(--border); align-self: stretch; flex-shrink: 0; }

.info { flex: 1; min-width: 0; }
.platform {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 2px 7px;
  border-radius: 999px;
  margin-bottom: 4px;
}
.card.upcoming .platform { background: rgba(126,200,126,0.15); color: var(--upcoming-text); }
.card.past .platform { background: rgba(126,158,200,0.15); color: #7e9ec8; }

.title {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}

.badge {
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 999px;
  align-self: flex-start;
  letter-spacing: 0.05em;
}
.badge-live { background: #ff3b3b; color: #fff; animation: pulse 1.5s ease-in-out infinite; }
.badge-upcoming { background: var(--upcoming-text); color: #0f0f0f; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }

/* 상태 */
.status {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 1rem;
  min-height: 18px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.spinner {
  width: 13px; height: 13px;
  border: 1.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--text3);
  font-size: 14px;
  line-height: 2;
}

footer {
  text-align: center;
  font-size: 11px;
  color: var(--text3);
  padding: 2rem;
}
</style>
</head>
<body>

<header>
  <div class="logo">라방 타이밍 체크</div>
  <div class="tagline">지금 살까, <span>방송 기다릴까?</span></div>
</header>

<main>
  <div class="search-wrap">
    <input type="text" id="input" placeholder="브랜드명 입력 (예: 아토팜, 달바…)" />
    <button id="btn" onclick="doSearch()">검색</button>
  </div>

  <div class="verdict" id="verdict">
    <div class="verdict-label">💡 타이밍 분석</div>
    <div class="verdict-text" id="verdictText"></div>
  </div>

  <div class="status" id="status"></div>
  <div id="result">
    <div class="empty">브랜드명을 검색하면<br>예정 방송과 과거 방송을 함께 보여드려요</div>
  </div>
</main>

<footer>데이터 출처: 라방바 데이터랩</footer>

<script>
const input = document.getElementById('input');
const btn = document.getElementById('btn');
const statusEl = document.getElementById('status');
const resultEl = document.getElementById('result');
const verdictEl = document.getElementById('verdict');
const verdictText = document.getElementById('verdictText');

input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function setStatus(msg, loading) {
  statusEl.innerHTML = loading
    ? `<div class="spinner"></div>${msg}`
    : msg ? `<span>${msg}</span>` : '';
}

function parseLabangDate(str) {
  // "2606170000" 형태 → Date
  if (!str || str.length < 8) return null;
  const yy = str.slice(0, 2), mm = str.slice(2, 4), dd = str.slice(4, 6);
  const hh = str.slice(6, 8), mi = str.slice(8, 10) || '00';
  return new Date(`20${yy}-${mm}-${dd}T${hh}:${mi}:00`);
}

function parseSearchDate(str) {
  // "26.06.16 (화) 10:29" 형태
  const m = str.match(/(\d{2})\.(\d{2})\.(\d{2})\s*\([^)]+\)\s*(\d{2}:\d{2})/);
  if (!m) return null;
  return new Date(`20${m[1]}-${m[2]}-${m[3]}T${m[4]}:00`);
}

function fmtDate(d) {
  if (!d) return { month: '?', day: '?', time: '' };
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  return {
    month: months[d.getMonth()],
    day: d.getDate(),
    time: `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`,
  };
}

function daysFromNow(d) {
  if (!d) return null;
  return Math.round((d - new Date()) / (1000 * 60 * 60 * 24));
}

function upcomingCard(item) {
  const start = parseLabangDate(item.start);
  const dt = fmtDate(start);
  const isLive = item.status === 1;
  const days = daysFromNow(start);
  const badge = isLive
    ? `<span class="badge badge-live">LIVE</span>`
    : `<span class="badge badge-upcoming">${days === 0 ? '오늘' : days + '일 후'}</span>`;
  return `
    <a class="card upcoming" href="${item.url || '#'}" target="_blank" rel="noopener">
      <div class="date-col">
        <div class="date-month">${dt.month}</div>
        <div class="date-day">${dt.day}</div>
        <div class="date-time">${dt.time}</div>
      </div>
      <div class="vline"></div>
      <div class="info">
        <span class="platform">${item.platform || '라이브'}</span>
        <div class="title">${item.title}</div>
      </div>
      ${badge}
    </a>`;
}

function pastCard(item) {
  const d = parseSearchDate(item.date);
  const dt = fmtDate(d);
  const days = daysFromNow(d);
  const ago = days === null ? '' : `${Math.abs(days)}일 전`;
  return `
    <a class="card past" href="${item.url}" target="_blank" rel="noopener">
      <div class="date-col">
        <div class="date-month">${dt.month}</div>
        <div class="date-day">${dt.day}</div>
        <div class="date-time">${dt.time}</div>
      </div>
      <div class="vline"></div>
      <div class="info">
        <span class="platform">${item.platform}</span>
        <div class="title">${item.title}</div>
      </div>
      ${ago ? `<span style="font-size:10px;color:var(--text3);flex-shrink:0;align-self:flex-start;margin-top:2px">${ago}</span>` : ''}
    </a>`;
}

function makeVerdict(upcoming, past) {
  const nextBcast = upcoming[0];
  const lastBcast = past[0];

  if (upcoming.length === 0 && past.length === 0) return null;

  if (upcoming.length > 0) {
    const start = parseLabangDate(nextBcast.start);
    const days = daysFromNow(start);
    if (days <= 3) {
      return `<span class="highlight">잠깐 기다리세요!</span> ${days === 0 ? '오늘' : days + '일 후'} ${nextBcast.platform}에서 방송 예정이에요. 방송 혜택 확인 후 구매를 추천해요.`;
    } else if (days <= 7) {
      return `${days}일 후 방송이 있어요 (${nextBcast.platform}). 급하지 않다면 기다려볼 만해요.`;
    } else {
      return `가장 가까운 방송까지 <span class="highlight">${days}일</span> 남았어요. 급하면 지금 구매, 여유 있으면 기다려보세요.`;
    }
  }

  if (past.length > 0) {
    const last = parseSearchDate(lastBcast.date);
    const ago = Math.abs(daysFromNow(last));
    return `예정된 방송 정보가 없어요. 최근 방송은 <span class="highlight">${ago}일 전</span>이었어요 (${lastBcast.platform}).`;
  }

  return null;
}

async function doSearch() {
  const keyword = input.value.trim();
  if (!keyword) return;

  btn.disabled = true;
  verdictEl.classList.remove('show');
  resultEl.innerHTML = '';
  setStatus(`"${keyword}" 검색 중…`, true);

  try {
    // 예정 방송 + 과거 방송 병렬 fetch
    const [schedRes, searchRes] = await Promise.all([
      fetch(`/api/schedule?keyword=${encodeURIComponent(keyword)}`),
      fetch(`/api/search?keyword=${encodeURIComponent(keyword)}`),
    ]);

    const schedData = await schedRes.json();
    const searchData = await searchRes.json();

    const upcoming = schedData.upcoming || [];
    const past = searchData.past || [];

    const total = upcoming.length + past.length;
    setStatus(total ? `예정 ${upcoming.length}건 · 과거 ${past.length}건 발견` : '검색 결과가 없어요');

    // 판단 배너
    const verdict = makeVerdict(upcoming, past);
    if (verdict) {
      verdictText.innerHTML = verdict;
      verdictEl.classList.add('show');
    }

    let html = '';

    if (upcoming.length) {
      html += `
        <div class="section">
          <div class="section-header">
            <div class="section-dot dot-upcoming"></div>
            <div class="section-title">예정 방송</div>
            <div class="section-count">${upcoming.length}건</div>
          </div>
          <div class="cards">${upcoming.map(upcomingCard).join('')}</div>
        </div>`;
    }

    if (past.length) {
      html += `
        <div class="section">
          <div class="section-header">
            <div class="section-dot dot-past"></div>
            <div class="section-title">지난 방송 — 최근 3개월</div>
            <div class="section-count">${past.length}건</div>
          </div>
          <div class="cards">${past.map(pastCard).join('')}</div>
        </div>`;
    }

    if (!html) {
      html = `<div class="empty">"${keyword}" 방송 기록이 없어요.<br>브랜드명을 다시 확인해보세요.</div>`;
    }

    resultEl.innerHTML = html;

  } catch (e) {
    setStatus('오류: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
