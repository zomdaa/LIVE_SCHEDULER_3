<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>라방 타이밍 체크</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105@1.1/JejuDoldam.css" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --canvas: #f9f7f3;
  --bone: #f3f0e8;
  --card: #ffffff;
  --dark: #202020;
  --deep: #000000;
  --ink: #202020;
  --body: #3a3a3a;
  --charcoal: #575757;
  --mute: #646464;
  --ash: #8d8d8d;
  --hairline: rgba(32,32,32,0.12);
  --hairline-strong: #202020;
  --primary: #ea2804;
  --primary-deep: #c01f00;
  --on-dark: #fcfcfc;
  --on-dark-mute: rgba(252,252,252,0.72);
}

body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: var(--canvas);
  color: var(--ink);
  min-height: 100vh;
}

.hero-band {
  background: radial-gradient(ellipse 140% 100% at 50% 0%, var(--primary) 0%, #ff6a3d 45%, #f4a8a0 75%, var(--canvas) 100%);
  padding: 4.5rem 1.5rem 5rem;
  text-align: center;
}
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  background: rgba(0,0,0,0.18);
  padding: 7px 16px;
  border-radius: 9999px;
  margin-bottom: 1.75rem;
}
.eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; }

h1 {
  font-family: 'JejuDoldam', 'Pretendard', sans-serif;
  font-size: 48px;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.15;
  color: #fff;
  margin-bottom: 1.1rem;
}

.sub {
  font-size: 16px;
  font-weight: 500;
  color: rgba(255,255,255,0.88);
  line-height: 1.6;
  white-space: nowrap;
  margin: 0 auto;
}

main { max-width: 720px; margin: 0 auto; padding: 0 1.5rem 4rem; }

.search-card {
  background: var(--card);
  border-radius: 20px;
  padding: 20px;
  margin-top: -3.5rem;
  margin-bottom: 1.25rem;
  box-shadow: 0 16px 40px rgba(32,32,32,0.14);
}

.search-wrap { display: flex; gap: 10px; }
.search-wrap input {
  flex: 1;
  height: 54px;
  padding: 0 20px;
  font-size: 16px;
  font-family: inherit;
  background: var(--bone);
  border: none;
  border-radius: 9999px;
  color: var(--ink);
  outline: none;
}
.search-wrap input::placeholder { color: var(--ash); }
.search-wrap input:focus { box-shadow: 0 0 0 3px rgba(59,130,246,0.35); }
.search-wrap button {
  height: 54px;
  padding: 0 30px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 9999px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.search-wrap button:hover { background: var(--primary-deep); }
.search-wrap button:disabled { opacity: 0.4; cursor: not-allowed; }

.chips { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.chip {
  font-size: 13px;
  font-weight: 600;
  color: var(--charcoal);
  background: var(--bone);
  padding: 8px 16px;
  border-radius: 9999px;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: background 0.15s;
}
.chip:hover { background: var(--hairline); }

.price-link {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  height: 56px;
  background: var(--dark);
  color: var(--on-dark);
  border-radius: 9999px;
  text-decoration: none;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 1.5rem;
}
.price-link:hover { background: var(--deep); }
.price-link .arrow { color: var(--primary); font-weight: 800; }

.verdict {
  background: var(--dark);
  border-radius: 20px;
  padding: 26px 28px;
  margin-bottom: 1.5rem;
  display: none;
}
.verdict.show { display: block; }
.verdict-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 10px;
}
.verdict-text {
  font-size: 18px;
  font-weight: 500;
  color: var(--on-dark);
  line-height: 1.55;
}
.verdict-text .highlight { color: #ff6a3d; font-weight: 700; }

.status {
  font-size: 13px;
  color: var(--mute);
  margin-bottom: 1rem;
  min-height: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.spinner {
  width: 14px; height: 14px;
  border: 1.5px solid var(--hairline);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.section { margin-bottom: 2rem; }
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  padding: 0 4px;
}
.section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-upcoming { background: var(--primary); }
.dot-past { background: var(--ash); }
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--charcoal);
}
.section-count {
  font-size: 12px;
  color: var(--ash);
  margin-left: auto;
}

.cards { display: flex; flex-direction: column; gap: 10px; }

.card {
  border-radius: 16px;
  padding: 18px 20px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.12s;
}
.card:hover { transform: translateY(-2px); }
.card.upcoming { background: var(--dark); color: var(--on-dark); }
.card.past { background: var(--card); color: var(--ink); border: 1px solid var(--hairline); }

.date-col { min-width: 48px; text-align: center; flex-shrink: 0; }
.date-month { font-size: 10px; font-weight: 700; letter-spacing: 0.04em; opacity: 0.6; }
.date-day { font-size: 26px; font-weight: 800; line-height: 1.1; }
.card.upcoming .date-day { color: #ff6a3d; }
.date-time { font-size: 10px; opacity: 0.6; margin-top: 2px; }

.vline { width: 1px; align-self: stretch; flex-shrink: 0; opacity: 0.15; background: currentColor; }

.info { flex: 1; min-width: 0; }
.platform {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.03em;
  padding: 4px 10px;
  border-radius: 9999px;
  margin-bottom: 6px;
}
.card.upcoming .platform { background: rgba(234,40,4,0.2); color: #ff9b7a; }
.card.past .platform { background: var(--bone); color: var(--charcoal); }

.title {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.badge {
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 9999px;
  align-self: flex-start;
}
.badge-live { background: var(--primary); color: #fff; }
.badge-upcoming { background: rgba(255,255,255,0.15); color: #fff; }

.ago-tag { font-size: 10px; color: var(--ash); flex-shrink: 0; align-self: flex-start; margin-top: 4px; }

.empty {
  text-align: center;
  padding: 3.5rem 1rem;
  color: var(--ash);
  font-size: 14px;
  line-height: 1.8;
}

footer {
  text-align: center;
  font-size: 12px;
  color: var(--ash);
  padding: 2rem;
}
</style>
</head>
<body>

<div class="hero-band">
  <div class="eyebrow"><span class="dot"></span>라방바 데이터 기반</div>
  <h1>지금 살까, 방송 기다릴까?</h1>
  <p class="sub">브랜드명을 검색하면 예정 방송과 지난 방송을 한눈에 비교해드려요</p>
</div>

<main>
  <div class="search-card">
    <div class="search-wrap">
      <input type="text" id="input" placeholder="브랜드명을 입력해보세요" />
      <button id="btn" onclick="doSearch()">검색</button>
    </div>
    <div class="chips">
      <button class="chip" onclick="quickSearch('아토팜')">아토팜</button>
      <button class="chip" onclick="quickSearch('로보락')">로보락</button>
      <button class="chip" onclick="quickSearch('달바')">달바</button>
      <button class="chip" onclick="quickSearch('크록스')">크록스</button>
    </div>
  </div>

  <a id="priceBtn" class="price-link" style="display:none" target="_blank" rel="noopener">
    현재 쿠팡 최저가 확인하기 <span class="arrow">→</span>
  </a>

  <div class="verdict" id="verdict">
    <div class="verdict-label">타이밍 분석</div>
    <div class="verdict-text" id="verdictText"></div>
  </div>

  <div class="status" id="status"></div>
  <div id="result">
    <div class="empty">브랜드명을 검색하면<br>예정 방송과 과거 방송을 함께 보여드려요</div>
  </div>
</main>

<footer>데이터 출처: 라방바 데이터랩</footer>

<script>
const input = document.getElementById('input');
const btn = document.getElementById('btn');
const statusEl = document.getElementById('status');
const resultEl = document.getElementById('result');
const verdictEl = document.getElementById('verdict');
const verdictText = document.getElementById('verdictText');

input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function quickSearch(keyword) {
  input.value = keyword;
  doSearch();
}

function setStatus(msg, loading) {
  statusEl.innerHTML = loading
    ? `<div class="spinner"></div>${msg}`
    : msg ? `<span>${msg}</span>` : '';
}

function parseLabangDate(str) {
  if (!str || str.length < 8) return null;
  const yy = str.slice(0, 2), mm = str.slice(2, 4), dd = str.slice(4, 6);
  const hh = str.slice(6, 8), mi = str.slice(8, 10) || '00';
  return new Date(`20${yy}-${mm}-${dd}T${hh}:${mi}:00`);
}

function parseSearchDate(str) {
  const m = str.match(/(\d{2})\.(\d{2})\.(\d{2})\s*\([^)]+\)\s*(\d{2}:\d{2})/);
  if (!m) return null;
  return new Date(`20${m[1]}-${m[2]}-${m[3]}T${m[4]}:00`);
}

function fmtDate(d) {
  if (!d) return { month: '?', day: '?', time: '' };
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  return {
    month: months[d.getMonth()],
    day: d.getDate(),
    time: `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`,
  };
}

function daysFromNow(d) {
  if (!d) return null;
  return Math.round((d - new Date()) / (1000 * 60 * 60 * 24));
}

function upcomingCard(item) {
  const start = parseLabangDate(item.start);
  const dt = fmtDate(start);
  const isLive = item.status === 1;
  const days = daysFromNow(start);
  const badge = isLive
    ? `<span class="badge badge-live">LIVE</span>`
    : `<span class="badge badge-upcoming">${days === 0 ? '오늘' : days + '일 후'}</span>`;
  return `
    <a class="card upcoming" href="${item.url || '#'}" target="_blank" rel="noopener">
      <div class="date-col">
        <div class="date-month">${dt.month}</div>
        <div class="date-day">${dt.day}</div>
        <div class="date-time">${dt.time}</div>
      </div>
      <div class="vline"></div>
      <div class="info">
        <span class="platform">${item.platform || '라이브'}</span>
        <div class="title">${item.title}</div>
      </div>
      ${badge}
    </a>`;
}

function pastCard(item) {
  const d = parseSearchDate(item.date);
  const dt = fmtDate(d);
  const days = daysFromNow(d);
  const ago = days === null ? '' : `${Math.abs(days)}일 전`;
  return `
    <a class="card past" href="${item.url}" target="_blank" rel="noopener">
      <div class="date-col">
        <div class="date-month">${dt.month}</div>
        <div class="date-day">${dt.day}</div>
        <div class="date-time">${dt.time}</div>
      </div>
      <div class="vline"></div>
      <div class="info">
        <span class="platform">${item.platform}</span>
        <div class="title">${item.title}</div>
      </div>
      ${ago ? `<span class="ago-tag">${ago}</span>` : ''}
    </a>`;
}

function makeVerdict(upcoming, past) {
  const nextBcast = upcoming[0];
  const lastBcast = past[0];

  if (upcoming.length === 0 && past.length === 0) return null;

  if (upcoming.length > 0) {
    const start = parseLabangDate(nextBcast.start);
    const days = daysFromNow(start);
    if (days <= 3) {
      return `<span class="highlight">잠깐 기다리세요!</span> ${days === 0 ? '오늘' : days + '일 후'} ${nextBcast.platform}에서 방송 예정이에요. 방송 혜택 확인 후 구매를 추천해요.`;
    } else if (days <= 7) {
      return `${days}일 후 방송이 있어요 (${nextBcast.platform}). 급하지 않다면 기다려볼 만해요.`;
    } else {
      return `가장 가까운 방송까지 <span class="highlight">${days}일</span> 남았어요. 급하면 지금 구매, 여유 있으면 기다려보세요.`;
    }
  }

  if (past.length > 0) {
    const last = parseSearchDate(lastBcast.date);
    const ago = Math.abs(daysFromNow(last));
    return `예정된 방송 정보가 없어요. 최근 방송은 <span class="highlight">${ago}일 전</span>이었어요 (${lastBcast.platform}).`;
  }

  return null;
}

async function doSearch() {
  const keyword = input.value.trim();
  if (!keyword) return;

  btn.disabled = true;
  verdictEl.classList.remove('show');
  resultEl.innerHTML = '';
  document.getElementById('priceBtn').style.display = 'none';
  setStatus(`"${keyword}" 검색 중…`, true);

  try {
    const [schedRes, searchRes] = await Promise.all([
      fetch(`/api/schedule?keyword=${encodeURIComponent(keyword)}`),
      fetch(`/api/search?keyword=${encodeURIComponent(keyword)}`),
    ]);

    const schedData = await schedRes.json();
    const searchData = await searchRes.json();

    const upcoming = schedData.upcoming || [];
    const past = searchData.past || [];

    const total = upcoming.length + past.length;
    setStatus(total ? `예정 ${upcoming.length}건 · 과거 ${past.length}건 발견` : '검색 결과가 없어요');

    const priceBtn = document.getElementById('priceBtn');
    priceBtn.href = 'https://alltimeprice.com/search/?search=' + encodeURIComponent(keyword);
    priceBtn.style.display = 'flex';

    const verdict = makeVerdict(upcoming, past);
    if (verdict) {
      verdictText.innerHTML = verdict;
      verdictEl.classList.add('show');
    }

    let html = '';

    if (upcoming.length) {
      html += `
        <div class="section">
          <div class="section-header">
            <div class="section-dot dot-upcoming"></div>
            <div class="section-title">예정 방송</div>
            <div class="section-count">${upcoming.length}건</div>
          </div>
          <div class="cards">${upcoming.map(upcomingCard).join('')}</div>
        </div>`;
    }

    if (past.length) {
      html += `
        <div class="section">
          <div class="section-header">
            <div class="section-dot dot-past"></div>
            <div class="section-title">지난 방송 · 최근 3개월</div>
            <div class="section-count">${past.length}건</div>
          </div>
          <div class="cards">${past.map(pastCard).join('')}</div>
        </div>`;
    }

    if (!html) {
      html = `<div class="empty">"${keyword}" 방송 기록이 없어요.<br>브랜드명을 다시 확인해보세요.</div>`;
    }

    resultEl.innerHTML = html;

  } catch (e) {
    setStatus('오류: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
