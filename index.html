<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>라방 타이밍 체크</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
@font-face {
  font-family: 'JejuStoneWall';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2210-EF@1.0/EF_jejudoldam.woff2') format('woff2');
  font-weight: normal;
  font-display: swap;
}
</style>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --canvas: #f9f7f3;
  --bone: #f3f0e8;
  --card: #ffffff;
  --dark: #202020;
  --deep: #000000;
  --ink: #202020;
  --body: #3a3a3a;
  --charcoal: #575757;
  --mute: #646464;
  --ash: #8d8d8d;
  --hairline: rgba(32,32,32,0.12);
  --hairline-strong: #202020;
  --primary: #ea2804;
  --primary-deep: #c01f00;
  --on-dark: #fcfcfc;
  --on-dark-mute: rgba(252,252,252,0.72);

  --urgency-live: linear-gradient(135deg, #ff3d2e 0%, #ea2804 100%);
  --urgency-1: linear-gradient(135deg, #ff7a45 0%, #ff5722 100%);
  --urgency-2: linear-gradient(135deg, #ffa45c 0%, #ff8a3d 100%);
  --urgency-3: linear-gradient(135deg, #ffc98a 0%, #ffaf5e 100%);
  --urgency-4: linear-gradient(135deg, #ffe4bf 0%, #ffd29c 100%);
  --past-gradient: linear-gradient(135deg, #3b3470 0%, #1f1b42 100%);
}

body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: var(--canvas);
  color: var(--ink);
  min-height: 100vh;
}

.hero-band {
  background: radial-gradient(ellipse 140% 100% at 50% 0%, var(--primary) 0%, #ff6a3d 45%, #f4a8a0 75%, var(--canvas) 100%);
  padding: 3.25rem 1.5rem 4.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero-deco {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.16;
  pointer-events: none;
}
.hero-deco.left { left: -40px; }
.hero-deco.right { right: -40px; transform: translateY(-50%) scaleX(-1); }
.hero-content { position: relative; z-index: 1; }
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  background: rgba(0,0,0,0.18);
  padding: 7px 16px;
  border-radius: 9999px;
  margin-bottom: 1.25rem;
}
.eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; }

.brand-title {
  font-family: 'JejuStoneWall', 'Pretendard', sans-serif;
  font-size: 52px;
  font-weight: 400;
  letter-spacing: 0.01em;
  line-height: 1.1;
  color: #fff;
  margin-bottom: 0.4rem;
  text-shadow: 0 2px 12px rgba(0,0,0,0.15);
}

h1 {
  font-family: 'JejuStoneWall', 'Pretendard', sans-serif;
  font-size: 30px;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.15;
  color: rgba(255,255,255,0.92);
  margin-bottom: 0.85rem;
}

.sub {
  font-size: 16px;
  font-weight: 500;
  color: rgba(255,255,255,0.88);
  line-height: 1.6;
  white-space: nowrap;
  margin: 0 auto;
}

main { max-width: 720px; margin: 0 auto; padding: 0 1.5rem 4rem; position: relative; }

.side-deco {
  position: absolute;
  top: 280px;
  width: 280px;
  opacity: 0.28;
  pointer-events: none;
  z-index: -1;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.side-deco.left { left: -260px; }
.side-deco.right { right: -260px; }
.side-deco img { width: 100%; display: block; border-radius: 24px; }

@media (max-width: 1300px) {
  .side-deco { display: none; }
}

.search-card {
  background: var(--card);
  border-radius: 20px;
  padding: 20px;
  margin-top: -2rem;
  margin-bottom: 1.25rem;
  box-shadow: 0 16px 40px rgba(32,32,32,0.14);
  position: relative;
  z-index: 1;
}

.search-wrap { display: flex; gap: 10px; }
.search-wrap input {
  flex: 1;
  height: 54px;
  padding: 0 20px;
  font-size: 16px;
  font-family: inherit;
  background: var(--bone);
  border: none;
  border-radius: 9999px;
  color: var(--ink);
  outline: none;
}
.search-wrap input::placeholder { color: var(--ash); }
.search-wrap input:focus { box-shadow: 0 0 0 3px rgba(59,130,246,0.35); }
.search-wrap button {
  height: 54px;
  padding: 0 30px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 9999px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.search-wrap button:hover { background: var(--primary-deep); }
.search-wrap button:disabled { opacity: 0.4; cursor: not-allowed; }

.chips { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.chip {
  font-size: 13px;
  font-weight: 600;
  color: var(--charcoal);
  background: var(--bone);
  padding: 8px 16px;
  border-radius: 9999px;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: background 0.15s;
}
.chip:hover { background: var(--hairline); }

.price-row { display: flex; gap: 10px; margin-bottom: 1.5rem; }
@media (max-width: 480px) {
  .price-row { flex-direction: column; }
  .brand-title { font-size: 38px; }
  h1 { font-size: 22px; }
  .sub { white-space: normal; }
}
.price-link {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex: 1;
  height: 56px;
  border-radius: 9999px;
  text-decoration: none;
  font-size: 14px;
  font-weight: 700;
  position: relative;
  z-index: 1;
  white-space: nowrap;
}
.price-link.coupang { background: #1a73e8; color: #fff; }
.price-link.coupang:hover { background: #1559b5; }
.price-link.naver { background: #03c75a; color: #fff; }
.price-link.naver:hover { background: #02a64a; }
.price-link .arrow { font-weight: 800; }
.price-link .brand-logo { flex-shrink: 0; }

.verdict {
  background: #fff8e8;
  border-radius: 28px;
  padding: 28px 30px 26px;
  margin-bottom: 1.5rem;
  margin-top: 28px;
  display: none;
  position: relative;
  z-index: 1;
  border: 3px solid #2d2a26;
}
.verdict.show { display: block; }
.verdict-tail {
  position: absolute;
  top: -22px;
  left: 32px;
  width: 56px;
  height: 30px;
  background: var(--primary);
  border: 3px solid #2d2a26;
  border-radius: 16px;
  border-bottom: none;
  clip-path: inset(0 0 10px 0);
}
.verdict-label {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.04em;
  color: var(--primary-deep);
  margin-bottom: 10px;
}
.verdict-title {
  font-size: 24px;
  font-weight: 800;
  color: var(--primary-deep);
  margin-bottom: 6px;
  line-height: 1.3;
}
.verdict-text {
  font-size: 16px;
  font-weight: 500;
  color: #4a3520;
  line-height: 1.6;
}
.verdict-text .highlight { color: var(--primary-deep); font-weight: 800; }

.status {
  font-size: 13px;
  color: var(--mute);
  margin-bottom: 1rem;
  min-height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  z-index: 1;
}
.spinner {
  width: 14px; height: 14px;
  border: 1.5px solid var(--hairline);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.section { margin-bottom: 2rem; }
.section-header {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 14px;
  padding: 0 4px;
}
.section-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dot-upcoming { background: var(--primary); }
.dot-past { background: #c9b020; }
.section-title {
  font-size: 16px;
  font-weight: 800;
  color: var(--ink);
}
.section-count {
  font-size: 13px;
  font-weight: 600;
  color: var(--mute);
  margin-left: auto;
}

.cards { display: flex; flex-direction: column; gap: 10px; }

.card {
  border-radius: 16px;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.12s;
  position: relative;
  z-index: 1;
  min-height: 76px;
}
.card:hover { transform: translateY(-2px); }

.card.past {
  background: rgba(245, 223, 77, 0.55);
  color: #5a4d10;
  border-radius: 16px;
}

.card.urgency-live { background: var(--urgency-live); color: #fff; }
.card.urgency-1 { background: var(--urgency-1); color: #fff; }
.card.urgency-2 { background: var(--urgency-2); color: #4a2a00; }
.card.urgency-3 { background: var(--urgency-3); color: #5a3a10; }
.card.urgency-4 { background: var(--urgency-4); color: #6b4520; }
.card.urgency-ended { background: #e8e6e0; color: #8a847a; }

.date-col { min-width: 48px; text-align: center; flex-shrink: 0; }
.date-month { font-size: 10px; font-weight: 700; letter-spacing: 0.04em; opacity: 0.7; }
.date-day { font-size: 26px; font-weight: 800; line-height: 1.1; }
.date-time { font-size: 10px; opacity: 0.7; margin-top: 2px; }

.vline { width: 1px; align-self: stretch; flex-shrink: 0; opacity: 0.2; background: currentColor; }

.info { flex: 1; min-width: 0; }
.platform {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.03em;
  padding: 4px 10px;
  border-radius: 9999px;
  margin-bottom: 6px;
  background: rgba(255,255,255,0.35);
}
.card.urgency-2 .platform, .card.urgency-3 .platform, .card.urgency-4 .platform { background: rgba(255,255,255,0.45); }
.card.urgency-ended .platform { background: rgba(138,132,122,0.18); color: #6b655d; }
.card.past .platform { background: rgba(90,77,16,0.15); color: #5a4d10; }

.title {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.badge-box {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  min-width: 64px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.4);
}
.card.urgency-live .badge-box, .card.urgency-1 .badge-box { background: rgba(255,255,255,0.25); }
.badge-box .badge-num {
  font-size: 20px;
  font-weight: 800;
  line-height: 1;
}
.badge-box .badge-unit {
  font-size: 10px;
  font-weight: 700;
  opacity: 0.8;
  white-space: nowrap;
}
.badge-live-box { background: #fff; color: #ea2804; }
.badge-live-box .badge-num { font-size: 13px; letter-spacing: 0.04em; }
.badge-ended-box { background: rgba(138,132,122,0.18); color: #6b655d; }

.go-arrow {
  flex-shrink: 0;
  font-size: 22px;
  font-weight: 800;
  opacity: 0.5;
  color: inherit;
}

.ago-box {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  min-width: 64px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(90,77,16,0.12);
}
.ago-box .ago-num { font-size: 20px; font-weight: 800; line-height: 1; }
.ago-box .ago-unit { font-size: 10px; font-weight: 700; opacity: 0.75; }

.empty {
  text-align: center;
  padding: 3.5rem 1rem;
  color: var(--ash);
  font-size: 14px;
  line-height: 1.8;
  position: relative;
  z-index: 1;
  background: var(--canvas);
}

footer {
  text-align: center;
  font-size: 12px;
  color: var(--ash);
  padding: 2rem;
}
</style>
</head>
<body>

<div class="hero-band">
  <div class="hero-content">
  <div class="eyebrow"><span class="dot"></span><span id="todayDate"></span></div>
  <div class="brand-title">BUY IT? OR NOT?</div>
  <h1>지금 살까, 방송 기다릴까?</h1>
  <p class="sub">브랜드명을 검색하면 예정 방송과 지난 방송을 한눈에 비교해드려요</p>
  </div>
</div>

<main>
  <div class="side-deco left">
    <img src="https://i.imgur.com/tpl2tbc.jpeg" alt="" />
    <img src="https://i.imgur.com/gk9Mlqh.jpeg" alt="" />
  </div>
  <div class="side-deco right">
    <img src="https://i.imgur.com/l7Ia9i2.jpeg" alt="" />
    <img src="https://i.imgur.com/gpodY9i.jpeg" alt="" />
  </div>

  <div class="search-card">
    <div class="search-wrap">
      <input type="text" id="input" placeholder="브랜드명을 입력해보세요" />
      <button id="btn" onclick="doSearch()">검색</button>
    </div>
    <div class="chips">
      <button class="chip" onclick="quickSearch('아토팜')">아토팜</button>
      <button class="chip" onclick="quickSearch('로보락')">로보락</button>
      <button class="chip" onclick="quickSearch('달바')">달바</button>
      <button class="chip" onclick="quickSearch('크록스')">크록스</button>
    </div>
  </div>

  <div class="price-row">
    <a id="priceBtn" class="price-link coupang" style="display:none" target="_blank" rel="noopener">
      <svg class="brand-logo" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="2" y="9" width="20" height="11" rx="2" fill="#fff"/>
        <path d="M5 9V6.5C5 4.01 7.01 2 9.5 2H14.5C16.99 2 19 4.01 19 6.5V9" stroke="#fff" stroke-width="2"/>
      </svg>
      쿠팡 최저가 확인하기 <span class="arrow">→</span>
    </a>
    <a id="naverBtn" class="price-link naver" style="display:none" target="_blank" rel="noopener">
      <svg class="brand-logo" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="24" height="24" rx="5" fill="#fff"/>
        <path d="M13.5 7V13.2L9.7 7H7V17H10.5V10.8L14.3 17H17V7H13.5Z" fill="#03c75a"/>
      </svg>
      네이버 최저가 확인하기 <span class="arrow">→</span>
    </a>
  </div>

  <div class="verdict" id="verdict">
    <div class="verdict-tail"></div>
    <div class="verdict-label">💬 타이밍 분석</div>
    <div class="verdict-title" id="verdictTitle"></div>
    <div class="verdict-text" id="verdictText"></div>
  </div>

  <div class="status" id="status"></div>
  <div id="result">
    <div class="empty">브랜드명을 검색하면<br>예정 방송과 과거 방송을 함께 보여드려요</div>
  </div>
</main>

<footer>데이터 출처: 라방바 데이터랩</footer>

<script>
const todayDateEl = document.getElementById('todayDate');
if (todayDateEl) {
  const today = new Date();
  const yy = String(today.getFullYear()).slice(2);
  const mm = today.getMonth() + 1;
  const dd = today.getDate();
  todayDateEl.textContent = `${yy}. ${mm}. ${dd}`;
}

const input = document.getElementById('input');
const btn = document.getElementById('btn');
const statusEl = document.getElementById('status');
const resultEl = document.getElementById('result');
const verdictEl = document.getElementById('verdict');
const verdictText = document.getElementById('verdictText');
const verdictTitle = document.getElementById('verdictTitle');

input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function quickSearch(keyword) {
  input.value = keyword;
  doSearch();
}

function setStatus(msg, loading) {
  statusEl.innerHTML = loading
    ? `<div class="spinner"></div>${msg}`
    : msg ? `<span>${msg}</span>` : '';
}

function parseLabangDate(str) {
  if (!str || str.length < 8) return null;
  const yy = str.slice(0, 2), mm = str.slice(2, 4), dd = str.slice(4, 6);
  const hh = str.slice(6, 8), mi = str.slice(8, 10) || '00';
  return new Date(`20${yy}-${mm}-${dd}T${hh}:${mi}:00`);
}

function parseSearchDate(str) {
  const m = str.match(/(\d{2})\.(\d{2})\.(\d{2})\s*\([^)]+\)\s*(\d{2}:\d{2})/);
  if (!m) return null;
  return new Date(`20${m[1]}-${m[2]}-${m[3]}T${m[4]}:00`);
}

function fmtDate(d) {
  if (!d) return { month: '?', day: '?', time: '' };
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  return {
    month: months[d.getMonth()],
    day: d.getDate(),
    time: `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`,
  };
}

function daysFromNow(d) {
  if (!d) return null;
  return Math.round((d - new Date()) / (1000 * 60 * 60 * 24));
}

function urgencyClass(isLive, isEnded, days) {
  if (isEnded) return 'urgency-ended';
  if (isLive) return 'urgency-live';
  if (days <= 1) return 'urgency-1';
  if (days <= 3) return 'urgency-2';
  if (days <= 7) return 'urgency-3';
  return 'urgency-4';
}

function upcomingCard(item) {
  const start = parseLabangDate(item.start);
  const end = parseLabangDate(item.end);
  const dt = fmtDate(start);
  const now = new Date();
  const isEnded = end ? end < now : false;
  const isLive = item.status === 1 && !isEnded;
  const days = daysFromNow(start);
  const urgency = urgencyClass(isLive, isEnded, days);

  let badgeHtml;
  if (isEnded) {
    badgeHtml = `<div class="badge-box badge-ended-box"><span class="badge-num">종료</span></div>`;
  } else if (isLive) {
    badgeHtml = `<div class="badge-box badge-live-box"><span class="badge-num">● LIVE</span></div>`;
  } else if (days === 0) {
    badgeHtml = `<div class="badge-box"><span class="badge-num">오늘</span></div>`;
  } else {
    badgeHtml = `<div class="badge-box"><span class="badge-num">D-${days}</span><span class="badge-unit">${days}일 후</span></div>`;
  }

  return `
    <a class="card ${urgency}" href="${item.url || '#'}" target="_blank" rel="noopener">
      <div class="date-col">
        <div class="date-month">${dt.month}</div>
        <div class="date-day">${dt.day}</div>
        <div class="date-time">${dt.time}</div>
      </div>
      <div class="vline"></div>
      <div class="info">
        <span class="platform">${item.platform || '라이브'}</span>
        <div class="title">${item.title}</div>
      </div>
      ${badgeHtml}
      <span class="go-arrow">›</span>
    </a>`;
}

function pastCard(item) {
  const d = parseLabangDate(item.start);
  const dt = fmtDate(d);
  const days = daysFromNow(d);
  const ago = days === null ? Math.abs(0) : Math.abs(days);
  return `
    <a class="card past" href="${item.url}" target="_blank" rel="noopener">
      <div class="date-col">
        <div class="date-month">${dt.month}</div>
        <div class="date-day">${dt.day}</div>
        <div class="date-time">${dt.time}</div>
      </div>
      <div class="vline"></div>
      <div class="info">
        <span class="platform">${item.platform}</span>
        <div class="title">${item.title}</div>
      </div>
      <div class="ago-box"><span class="ago-num">${ago}</span><span class="ago-unit">일 전</span></div>
      <span class="go-arrow">›</span>
    </a>`;
}

function makeVerdict(upcoming, past) {
  const nextBcast = upcoming.find(u => {
    const end = parseLabangDate(u.end);
    return !end || end >= new Date();
  }) || upcoming[0];
  const lastBcast = past[0];

  if (!nextBcast) {
  if (past.length > 0) {
    const last = parseLabangDate(lastBcast.start);
    const ago = Math.abs(daysFromNow(last));
    return {
      title: '예정된 방송이 없습니다ㅠ',
      body: `현시점 최저가로 구매해보세요! 최근 방송은 ${ago}일 전이었어요 (${lastBcast.platform}).`
    };
  }
    return {
      title: '예정된 방송이 없습니다ㅠ',
      body: '현시점 최저가로 구매해보세요!'
    };
  }

  const start = parseLabangDate(nextBcast.start);
  const days = daysFromNow(start);

  if (days === 0) {
    return {
      title: '구매 타이밍 야~호~~',
      body: `오늘 ${nextBcast.platform}에서 방송 예정이에요. 방송 혜택 확인 후 구매를 추천해요.`
    };
  } else if (days <= 3) {
    return {
      title: '맛떼루용~~',
      body: `${days}일 후 ${nextBcast.platform}에서 방송 예정이에요. 방송 혜택 확인 후 구매를 추천해요.`
    };
  } else if (days <= 7) {
    return {
      title: '맛떼루용~~',
      body: `${days}일 후 방송이 있어요 (${nextBcast.platform}). 급하지 않다면 기다려볼 만해요.`
    };
  } else {
    return {
      title: '맛떼루용~~',
      body: `가장 가까운 방송까지 ${days}일 남았어요. 급하면 지금 구매, 여유 있으면 기다려보세요.`
    };
  }
}

async function doSearch() {
  const keyword = input.value.trim();
  if (!keyword) return;

  btn.disabled = true;
  verdictEl.classList.remove('show');
  resultEl.innerHTML = '';
  document.getElementById('priceBtn').style.display = 'none';
  document.getElementById('naverBtn').style.display = 'none';
  setStatus(`최저가 혜택을 위해 열심히 찾는 중..!`, true);

  try {
    const [schedRes, searchRes] = await Promise.all([
      fetch(`/api/schedule?keyword=${encodeURIComponent(keyword)}`),
      fetch(`/api/search?keyword=${encodeURIComponent(keyword)}`),
    ]);

    const schedData = await schedRes.json();
    const searchData = await searchRes.json();

    const upcoming = schedData.upcoming || [];
    const past = searchData.past || [];

    const total = upcoming.length + past.length;
    setStatus(total ? `예정 ${upcoming.length}건 · 과거 ${past.length}건 발견` : '검색 결과가 없어요');

    const priceBtn = document.getElementById('priceBtn');
    priceBtn.href = 'https://alltimeprice.com/search/?search=' + encodeURIComponent(keyword);
    priceBtn.style.display = 'flex';

    const naverBtn = document.getElementById('naverBtn');
    naverBtn.href = 'https://search.naver.com/search.naver?where=nexearch&sm=top_hty&fbm=0&ie=utf8&query=' + encodeURIComponent(keyword);
    naverBtn.style.display = 'flex';

    const verdict = makeVerdict(upcoming, past);
    if (verdict) {
      verdictTitle.textContent = verdict.title;
      verdictText.textContent = verdict.body;
      verdictEl.classList.add('show');
    } else {
      verdictEl.classList.remove('show');
    }

    let html = '';

    if (upcoming.length) {
      html += `
        <div class="section">
          <div class="section-header">
            <div class="section-dot dot-upcoming"></div>
            <div class="section-title">예정 방송</div>
            <div class="section-count">${upcoming.length}건</div>
          </div>
          <div class="cards">${upcoming.map(upcomingCard).join('')}</div>
        </div>`;
    }

    if (past.length) {
      html += `
        <div class="section">
          <div class="section-header">
            <div class="section-dot dot-past"></div>
            <div class="section-title">지난 방송 · 최근 3개월</div>
            <div class="section-count">${past.length}건</div>
          </div>
          <div class="cards">${past.map(pastCard).join('')}</div>
        </div>`;
    }

    if (!html) {
      html = `<div class="empty">"${keyword}" 방송 기록이 없어요.<br>브랜드명을 다시 확인해보세요.</div>`;
    }

    resultEl.innerHTML = html;

  } catch (e) {
    setStatus('오류: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
